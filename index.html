<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Agenda de Turnos</h2>

  <input type="date" id="fecha">

  <select id="hora"></select>

  <select id="duracion">
    <option value="60">60 min</option>
    <option value="90">90 min</option>
  </select>

  <input type="text" id="nombre" placeholder="Nombre paciente">
  <input type="text" id="obs" placeholder="Observaciones">

  <button onclick="guardarTurno()">Guardar Turno</button>

  <button onclick="compartirTurnos()">Compartir</button>

  <div id="lista"></div>
</div>

<script src="script.js"></script>
</body>
</html>

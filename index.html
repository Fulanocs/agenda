<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agenda</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 10px;
      margin: 0;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      border: none;
    }

    .guardar {
      background: #007bff;
      color: white;
    }

    .card {
      background: white;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn-compartir {
      background: #25D366;
      color: white;
      margin-top: 8px;
    }

    .btn-borrar {
      background: #dc3545;
      color: white;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h2>Agenda de Pacientes</h2>

  <input type="text" id="nombre" placeholder="Nombre del paciente">
  <input type="date" id="fecha">
  <input type="time" id="hora">

  <button class="guardar" onclick="guardarPaciente()">Guardar turno</button>

  <div id="lista"></div>

  <script src="app.js"></script>
</body>
</html>

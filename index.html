<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agenda Celular</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  Agenda Celular
</header>

<section>
  <h2>Agenda del Día</h2>
  <div id="agenda"></div>
</section>

<section>
  <h2>Nuevo Turno</h2>
  <form id="form-turno">
    <input type="text" id="nombre" placeholder="Nombre paciente" required>
    <input type="tel" id="telefono" placeholder="Teléfono" required>
    <input type="text" id="observaciones" placeholder="Observaciones">

    <label>Duración:</label>
    <select id="duracion">
      <option value="60">1 hora</option>
      <option value="90">1h 30 min</option>
    </select>

    <label>Fecha:</label>
    <input type="date" id="fecha" required>

    <label>Hora:</label>
    <select id="hora"></select>

    <button type="submit">Agregar turno</button>
  </form>
</section>

<section>
  <h2>Historial</h2>
  <div id="lista-pacientes"></div>
</section>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agenda Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Agenda de Turnos</h1>

<div class="form">
  <input type="text" id="nombre" placeholder="Nombre paciente">
  
  <input type="tel" id="telefono" placeholder="Teléfono (598...)">

  <label>Fecha:</label>
  <input type="date" id="fecha">

  <label>Duración:</label>
  <select id="duracion">
    <option value="60">1 hora</option>
    <option value="90">1h 30 min</option>
  </select>

  <label>Hora:</label>
  <select id="hora"></select>

  <button onclick="agendar()">Agendar</button>
</div>

<h2>Turnos del día</h2>
<div id="lista"></div>

<script src="script.js"></script>

</body>
</html>
